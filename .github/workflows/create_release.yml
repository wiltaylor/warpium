name: Create Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild. Leave empty to create a new release tag.
        required: false
        type: string
      rerelease:
        description: Rebuild and re-attach artifacts for the latest matching release tag.
        type: boolean
        default: false
      build_linux:
        description: Build Linux binary.
        type: boolean
        default: true
      build_windows:
        description: Build Windows binary.
        type: boolean
        default: true
      build_macos:
        description: Build macOS binary.
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      do_release: ${{ steps.release.outputs.do_release }}
      release_tag: ${{ steps.release.outputs.tag }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      build_linux: ${{ steps.release.outputs.build_linux }}
      build_windows: ${{ steps.release.outputs.build_windows }}
      build_macos: ${{ steps.release.outputs.build_macos }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RERELEASE: ${{ inputs.rerelease }}
          INPUT_BUILD_LINUX: ${{ inputs.build_linux }}
          INPUT_BUILD_WINDOWS: ${{ inputs.build_windows }}
          INPUT_BUILD_MACOS: ${{ inputs.build_macos }}
        run: |
          RELEASE_TRAILER=$(git log -1 --format='%(trailers:key=release,valueonly)')
          PRERELEASE_TRAILER=$(git log -1 --format='%(trailers:key=pre-release,valueonly)')
          RERELEASE_TRAILER=$(git log -1 --format='%(trailers:key=re-release,valueonly)')
          CREATE_TAG=false
          IS_PRERELEASE=false

          if [[ -n "$INPUT_TAG" ]]; then
            RELEASE_TAG="$INPUT_TAG"
          elif [[ "$INPUT_RERELEASE" == "true" || "$RERELEASE_TRAILER" == "true" ]]; then
            RELEASE_TAG=$(git describe --tags --match 'v*' --abbrev=0)
          elif [[ "$RERELEASE_TRAILER" == v* ]]; then
            RELEASE_TAG="$RERELEASE_TRAILER"
          elif [[ "$RELEASE_TRAILER" == "true" || "$PRERELEASE_TRAILER" == "true" ]]; then
            SUFFIX="release"
            if [[ "$PRERELEASE_TRAILER" == "true" ]]; then
              SUFFIX="pre"
              IS_PRERELEASE=true
            fi
            RELEASE_TAG="v0.$(date -u +'%Y.%m.%d.%H.%M').${SUFFIX}_00"
            CREATE_TAG=true
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            RELEASE_TAG="v0.$(date -u +'%Y.%m.%d.%H.%M').release_00"
            CREATE_TAG=true
          else
            echo "do_release=false" >> "$GITHUB_OUTPUT"
            echo "No release trailer found. Add 'release: true', 'pre-release: true', or 're-release: true' to the HEAD commit."
            exit 0
          fi

          if [[ "$RELEASE_TAG" == *pre* || "$RELEASE_TAG" == *alpha* ]]; then
            IS_PRERELEASE=true
          fi

          echo "do_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "create_tag=$CREATE_TAG" >> "$GITHUB_OUTPUT"
          echo "build_linux=${INPUT_BUILD_LINUX:-true}" >> "$GITHUB_OUTPUT"
          echo "build_windows=${INPUT_BUILD_WINDOWS:-true}" >> "$GITHUB_OUTPUT"
          echo "build_macos=${INPUT_BUILD_MACOS:-true}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: ${{ steps.release.outputs.create_tag == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ steps.release.outputs.do_release == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: Warpium ${{ steps.release.outputs.tag }}
          tag_name: ${{ steps.release.outputs.tag }}
          body: Warpium release binaries.
          draft: false
          prerelease: ${{ steps.release.outputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build_linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.do_release == 'true' && needs.prepare_release.outputs.build_linux == 'true' }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false

      - name: Build release binary
        run: cargo build -p warp --bin warp-oss --release --features gui
        shell: bash

      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/release/warp-oss dist/warpium
          tar czf warpium-linux-x86_64.tar.gz -C dist warpium
        shell: bash

      - name: Attach binary to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: warpium-linux-x86_64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  build_macos:
    name: Build macOS binary (${{ matrix.arch }})
    runs-on: macos-26-xlarge
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.do_release == 'true' && needs.prepare_release.outputs.build_macos == 'true' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            rust_target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.rust_target }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false

      - name: Build release binary
        run: cargo build -p warp --bin warp-oss --release --features gui --target ${{ matrix.rust_target }}
        shell: bash

      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/warp-oss dist/warpium
          tar czf warpium-macos-${{ matrix.arch }}.tar.gz -C dist warpium
        shell: bash

      - name: Attach binary to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: warpium-macos-${{ matrix.arch }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    name: Build Windows binary (${{ matrix.arch }})
    runs-on: windows-latest-large
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.do_release == 'true' && needs.prepare_release.outputs.build_windows == 'true' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-pc-windows-msvc
          - arch: arm64
            rust_target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.rust_target }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          cache_key: windows-${{ matrix.arch }}
          is_self_hosted: false

      - name: Build release binary
        run: cargo build -p warp --bin warp-oss --release --features gui --target ${{ matrix.rust_target }}
        shell: bash

      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/warp-oss.exe dist/warpium.exe
          7z a warpium-windows-${{ matrix.arch }}.zip ./dist/warpium.exe
        shell: bash

      - name: Attach binary to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: warpium-windows-${{ matrix.arch }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
