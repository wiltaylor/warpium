name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and attach assets to.
        required: true
        type: string
      build_linux:
        description: Build Linux artifacts.
        type: boolean
        default: true
      build_windows:
        description: Build Windows artifacts.
        type: boolean
        default: true
      build_macos:
        description: Build macOS artifacts.
        type: boolean
        default: true
      build_web:
        description: Build web artifacts.
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CONFIG_FILE: ".github/workflows/release_configurations.json"
  SKIP_LINUX_PACKAGE_SIGNING: "true"

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      channel: ${{ steps.release.outputs.channel }}
      build_linux: ${{ steps.release.outputs.build_linux }}
      build_windows: ${{ steps.release.outputs.build_windows }}
      build_macos: ${{ steps.release.outputs.build_macos }}
      build_web: ${{ steps.release.outputs.build_web }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Compute release metadata
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_BUILD_LINUX: ${{ inputs.build_linux }}
          INPUT_BUILD_WINDOWS: ${{ inputs.build_windows }}
          INPUT_BUILD_MACOS: ${{ inputs.build_macos }}
          INPUT_BUILD_WEB: ${{ inputs.build_web }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            RELEASE_TAG="$INPUT_TAG"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "$RELEASE_TAG" == *-dev || "$RELEASE_TAG" == *-dev.* ]]; then
            CHANNEL="dev"
          elif [[ "$RELEASE_TAG" == *-preview || "$RELEASE_TAG" == *-preview.* ]]; then
            CHANNEL="preview"
          else
            CHANNEL="stable"
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "build_linux=${INPUT_BUILD_LINUX:-true}" >> "$GITHUB_OUTPUT"
          echo "build_windows=${INPUT_BUILD_WINDOWS:-true}" >> "$GITHUB_OUTPUT"
          echo "build_macos=${INPUT_BUILD_MACOS:-true}" >> "$GITHUB_OUTPUT"
          echo "build_web=${INPUT_BUILD_WEB:-true}" >> "$GITHUB_OUTPUT"

      - name: Get channel configuration
        id: get-config
        uses: ./.github/actions/get_channel_config/
        with:
          config_file: ${{ env.CONFIG_FILE }}
          channel: ${{ steps.release.outputs.channel }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ steps.get-config.outputs.release_base_name }} ${{ steps.release.outputs.tag }}
          tag_name: ${{ steps.release.outputs.tag }}
          body: ${{ steps.get-config.outputs.release_body_text }}
          draft: false
          prerelease: ${{ steps.get-config.outputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release_macos_single_arch:
    name: Build Release (macOS ${{ matrix.dmg_name_suffix }})
    runs-on: macos-26-xlarge
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_macos == 'true' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            dmg_name_suffix: arm64
          - arch: x86_64
            dmg_name_suffix: x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Ensure rust target is installed
        run: rustup target add ${{ matrix.arch }}-apple-darwin
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build ${{ matrix.arch }} bundle
        id: bundle_app
        run: script/bundle --nosign --channel "$CHANNEL" --arch ${{ matrix.arch }} --dmg-name-suffix "${{ matrix.dmg_name_suffix }}"
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Add DMG to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: ${{ steps.bundle_app.outputs.dmg_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tar archive with build artifacts
        run: |
          tar czfv build-artifacts.tar.gz \
            ${{ steps.bundle_app.outputs.binary_path }} \
            ${{ steps.bundle_app.outputs.dock_tile_plugin_dir }} \
            ${{ steps.bundle_app.outputs.dsym_path }} \
            ${{ steps.bundle_app.outputs.dsym_realpath }} \
            ${{ steps.bundle_app.outputs.frameworks_dir }}
        shell: bash

      - name: Archive ${{ matrix.arch }} build artifacts for universal build
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-${{ matrix.arch }}-${{ needs.prepare_release.outputs.channel }}
          retention-days: 1
          compression-level: 0
          path: build-artifacts.tar.gz

  release_macos_universal:
    name: Build Release (macOS Universal)
    runs-on: macos-26-xlarge
    needs: [prepare_release, release_macos_single_arch]
    if: ${{ needs.prepare_release.outputs.build_macos == 'true' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Download aarch64 build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-aarch64-${{ needs.prepare_release.outputs.channel }}

      - name: Extract aarch64 build artifacts
        run: tar xvfz build-artifacts.tar.gz
        shell: bash

      - name: Download x86_64 build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-x86_64-${{ needs.prepare_release.outputs.channel }}

      - name: Extract x86_64 build artifacts
        run: tar xvfz build-artifacts.tar.gz
        shell: bash

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Bundle universal app
        id: bundle_app
        run: script/bundle --skip-build --nosign --channel "$CHANNEL"
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Add DMG to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: ${{ steps.bundle_app.outputs.dmg_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release_macos_cli:
    name: Build Release (macOS CLI ${{ matrix.arch }})
    runs-on: macos-26-xlarge
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_macos == 'true' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
          - arch: x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Ensure rust target is installed
        run: rustup target add ${{ matrix.arch }}-apple-darwin
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Build ${{ matrix.arch }} binary
        id: bundle_cli
        run: script/bundle --nosign --channel "$CHANNEL" --arch ${{ matrix.arch }} --artifact cli
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Package CLI binary
        run: |
          mv ${{ steps.bundle_cli.outputs.binary_path }} oz-${{ needs.prepare_release.outputs.channel }}
          tar czf oz-${{ needs.prepare_release.outputs.channel }}-macos-${{ matrix.arch }}.tar.gz oz-${{ needs.prepare_release.outputs.channel }} -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources
        shell: bash

      - name: Add CLI to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: oz-${{ needs.prepare_release.outputs.channel }}-macos-${{ matrix.arch }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  release_linux_x86:
    name: Build Release (Linux x86_64)
    runs-on: namespace-profile-ubuntu-20-04
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_linux == 'true' }}
    timeout-minutes: 60
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Install and configure gcc-10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          gcc --version
          g++ --version
        shell: bash

      - name: Install linuxdeploy
        run: script/linux/install_linuxdeploy

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Bundle app
        id: bundle_app
        run: script/bundle --channel "$CHANNEL" --packages appimage,deb,rpm
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Bundle Arch Linux package
        uses: ./.github/actions/bundle_arch_package
        with:
          channel: ${{ needs.prepare_release.outputs.channel }}
          release-tag: ${{ needs.prepare_release.outputs.release_tag }}
          arch: x86_64

      - name: Add app packages to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: ${{ steps.bundle_app.outputs.packages_dir }}/*
          token: ${{ secrets.GITHUB_TOKEN }}

  release_linux_cli_x86:
    name: Build Release (Linux CLI x86_64)
    runs-on: namespace-profile-ubuntu-20-04
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_linux == 'true' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Install and configure gcc-10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          gcc --version
          g++ --version
        shell: bash

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Bundle CLI
        id: bundle_cli
        run: script/bundle --channel "$CHANNEL" --artifact cli --packages deb,rpm
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Package CLI tar.gz
        run: |
          cp ${{ steps.bundle_cli.outputs.executable_path }} oz-${{ needs.prepare_release.outputs.channel }}
          tar czf oz-${{ needs.prepare_release.outputs.channel }}-linux-x86_64.tar.gz oz-${{ needs.prepare_release.outputs.channel }} -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources
        shell: bash

      - name: Bundle Arch Linux CLI package
        uses: ./.github/actions/bundle_arch_package
        with:
          channel: ${{ needs.prepare_release.outputs.channel }}
          release-tag: ${{ needs.prepare_release.outputs.release_tag }}
          arch: x86_64
          artifact: cli

      - name: Add CLI packages to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_cli.outputs.packages_dir }}/*
            oz-${{ needs.prepare_release.outputs.channel }}-linux-x86_64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  build_linux_arm_binaries:
    name: Build Release (Linux ARM)
    runs-on: namespace-profile-ubuntu-20-04-arm
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_linux == 'true' }}
    timeout-minutes: 60
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Install and configure gcc-10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          gcc --version
          g++ --version
        shell: bash

      - name: Update path
        run: |
          if [[ ":$PATH:" != *":$HOME/.local/bin:"* ]]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
        shell: bash

      - name: Install linuxdeploy
        run: script/linux/install_linuxdeploy

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Build app
        id: build_app
        run: script/bundle --channel "$CHANNEL" --packages appimage
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Package binaries
        run: |
          EXECUTABLE_PATH="$(realpath --relative-to=$(pwd) "$EXECUTABLE_PATH")"
          DEBUG_EXECUTABLE_PATH="$(realpath --relative-to=$(pwd) "$DEBUG_EXECUTABLE_PATH")"
          PACKAGES_DIR="$(realpath --relative-to=$(pwd) "$PACKAGES_DIR")"
          tar czvf binaries.tar.gz "$EXECUTABLE_PATH" "$DEBUG_EXECUTABLE_PATH" "$PACKAGES_DIR"
        shell: bash
        env:
          EXECUTABLE_PATH: ${{ steps.build_app.outputs.executable_path }}
          DEBUG_EXECUTABLE_PATH: ${{ steps.build_app.outputs.debug_executable_path }}
          PACKAGES_DIR: ${{ steps.build_app.outputs.packages_dir }}

      - name: Archive build files
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: built-arm64-linux-${{ needs.prepare_release.outputs.channel }}
          retention-days: 1
          path: binaries.tar.gz

  build_linux_cli_arm_binaries:
    name: Build Release (Linux CLI ARM)
    runs-on: namespace-profile-ubuntu-20-04-arm
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_linux == 'true' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Install and configure gcc-10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          gcc --version
          g++ --version
        shell: bash

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Build CLI
        id: build_cli
        run: script/bundle --channel "$CHANNEL" --artifact cli --packages none
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Package binaries
        run: |
          EXECUTABLE_PATH="$(realpath --relative-to=$(pwd) "$EXECUTABLE_PATH")"
          DEBUG_EXECUTABLE_PATH="$(realpath --relative-to=$(pwd) "$DEBUG_EXECUTABLE_PATH")"
          PACKAGES_DIR="$(realpath --relative-to=$(pwd) "$PACKAGES_DIR")"
          tar czvf binaries-cli.tar.gz "$EXECUTABLE_PATH" "$DEBUG_EXECUTABLE_PATH" "$PACKAGES_DIR"
        shell: bash
        env:
          EXECUTABLE_PATH: ${{ steps.build_cli.outputs.executable_path }}
          DEBUG_EXECUTABLE_PATH: ${{ steps.build_cli.outputs.debug_executable_path }}
          PACKAGES_DIR: ${{ steps.build_cli.outputs.packages_dir }}

      - name: Archive build files
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: built-arm64-linux-cli-${{ needs.prepare_release.outputs.channel }}
          retention-days: 1
          path: binaries-cli.tar.gz

  release_linux_arm:
    name: Bundle Release (Linux ARM)
    runs-on: namespace-profile-ubuntu-20-04
    needs: [prepare_release, build_linux_arm_binaries, build_linux_cli_arm_binaries]
    if: ${{ needs.prepare_release.outputs.build_linux == 'true' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install and configure gcc-10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          gcc --version
          g++ --version
        shell: bash

      - name: Install Linux build dependencies
        run: ./script/linux/install_build_deps
        shell: bash

      - name: Install release dependencies
        run: ./script/install_cargo_release_deps --no-build-deps
        shell: bash

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Download app build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-arm64-linux-${{ needs.prepare_release.outputs.channel }}

      - name: Unpackage app binaries
        run: tar xzvf binaries.tar.gz
        shell: bash

      - name: Bundle deb/rpm app packages
        id: bundle_app
        run: script/bundle --channel "$CHANNEL" --skip-build --packages deb,rpm --arch aarch64
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Bundle Arch Linux app package
        uses: ./.github/actions/bundle_arch_package
        with:
          channel: ${{ needs.prepare_release.outputs.channel }}
          release-tag: ${{ needs.prepare_release.outputs.release_tag }}
          arch: aarch64

      - name: Download CLI build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-arm64-linux-cli-${{ needs.prepare_release.outputs.channel }}

      - name: Unpackage CLI binaries
        run: tar xzvf binaries-cli.tar.gz
        shell: bash

      - name: Bundle deb/rpm CLI packages
        id: bundle_cli
        run: script/bundle --channel "$CHANNEL" --skip-build --arch aarch64 --packages deb,rpm --artifact cli
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Package CLI tar.gz
        run: |
          cp ${{ steps.bundle_cli.outputs.executable_path }} oz-${{ needs.prepare_release.outputs.channel }}
          tar czf oz-${{ needs.prepare_release.outputs.channel }}-linux-aarch64.tar.gz oz-${{ needs.prepare_release.outputs.channel }} -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources
        shell: bash

      - name: Bundle Arch Linux CLI package
        uses: ./.github/actions/bundle_arch_package
        with:
          channel: ${{ needs.prepare_release.outputs.channel }}
          release-tag: ${{ needs.prepare_release.outputs.release_tag }}
          arch: aarch64
          artifact: cli

      - name: Add Linux ARM packages to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_app.outputs.packages_dir }}/*
            ${{ steps.bundle_cli.outputs.packages_dir }}/*
            oz-${{ needs.prepare_release.outputs.channel }}-linux-aarch64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  release_web:
    name: Build Release (Web)
    runs-on: namespace-profile-ubuntu-22-04
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_web == 'true' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: wasm
          is_self_hosted: false
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Bundle app
        id: bundle_app
        run: script/wasm/bundle --channel "$CHANNEL"
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Brotli compress app bundle
        run: |
          brotli --rm "${{ steps.bundle_app.outputs.packages_dir }}"/*
          for file in "${{ steps.bundle_app.outputs.packages_dir }}"/*.br; do
            mv -- "$file" "${file%.br}"
          done
        shell: bash

      - name: Add packages to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: ${{ steps.bundle_app.outputs.packages_dir }}/*
          token: ${{ secrets.GITHUB_TOKEN }}

  release_windows:
    name: Build Release (Windows ${{ matrix.arch }})
    runs-on: windows-latest-large
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.build_windows == 'true' }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          cache_key: ${{ matrix.arch }}
          is_self_hosted: false
          install_release_deps: true
          ssh_key: ${{ secrets.WARP_CHANNEL_CONFIG_ACCESS_SSH_KEY }}

      - name: Add arm64 target
        if: ${{ matrix.arch == 'arm64' }}
        run: rustup target add aarch64-pc-windows-msvc
        shell: bash

      - name: Bundle app
        id: bundle_app
        run: script/bundle -Channel $CHANNEL --arch ${{ matrix.arch }}
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Add installer to GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: ${{ steps.bundle_app.outputs.installer_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
